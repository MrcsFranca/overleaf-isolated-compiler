services:
    sharelatex:
        restart: always
        image: "${IMAGE}"
        container_name: sharelatex
        volumes:
            - "${OVERLEAF_DATA_PATH}:${OVERLEAF_IN_CONTAINER_DATA_PATH}"
            - ../../proxy/settings.custom.js:/etc/overleaf/settings.js # copy our settings.custom.js to settings.js
        ports:
            - "${OVERLEAF_LISTEN_IP:-127.0.0.1}:${OVERLEAF_PORT:-80}:80"
        environment:
          GIT_BRIDGE_ENABLED: "${GIT_BRIDGE_ENABLED}"
          GIT_BRIDGE_HOST: "git-bridge"
          GIT_BRIDGE_PORT: "8000"
          REDIS_HOST: "${REDIS_HOST}"
          REDIS_PORT: "${REDIS_PORT}"
          V1_HISTORY_URL: "http://sharelatex:3100/api"
        env_file:
            - ../config/variables.env
        stop_grace_period: 60s

    proxy: # build up our proxy
        build: ../../proxy # path to Dockerfile
        container_name: proxy
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock # with this, we are able to create and orchestrate new containers inside our container (Docker-out-of-Docker - DooD)
            - /tmp/sandbox:/tmp/sandbox # where the tex files are temporary saved
            - "${OVERLEAF_DATA_PATH}:${OVERLEAF_IN_CONTAINER_DATA_PATH}" # the path where to the data base used by the tex code, like images
